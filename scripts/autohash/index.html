<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="../../latex.css">
    <title>gadmaj.org/scripts/autohash</title>
</head>
<body>
    <main>
        <h1><a href="../">scripts</a>/autohash</h1>
        <p>
            <a href="../autohash.ps1">raw</a>
            <span>&middot;</span>
            <a href="../../">home</a>
        </p>
        <pre><code id="script-source">loading...</code></pre>
    </main>

    <script>
        fetch("../autohash.ps1")
            .then((response) => {
                if (!response.ok) {
                throw new Error(response.status + " " + response.statusText);                          }
                return response.text();
            })
            .then((text) => {
                document.getElementById("script-source").textContent = text;
            })
            .catch((error) => {
                document.getElementById("script-source").textContent =
                    "Could not load script: " + error.message;
            });
    </script>
</body>
</html>
